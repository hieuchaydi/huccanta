name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # server dùng node:sqlite (chỉ có từ Node 22)
          cache: npm
      - run: npm ci
      - run: npm run build # tsc -b + vite build
      - run: npm test # vitest (gồm test đa ngôn ngữ tree-sitter)
